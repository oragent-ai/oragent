name: ❓ Question
description: Open-ended question or clarification. For bugs use Bug report; for requests use Feature request.
title: "[Question] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening: please scan the
        [README](https://github.com/oragent-ai/oragent#readme) and
        [oragent.org](https://oragent.org), then search existing issues.

        Good questions to ask here:
        - "Does Oragent work with X terminal / X tmux config?"
        - "What does Auto Pilot actually approve?"
        - "How is Oragent different from Y?"

        Questions that belong somewhere else:
        - "How do I use Claude Code?" (ask Anthropic)
        - "Why is my API key not working?" (ask your AI provider)

  - type: textarea
    id: question
    attributes:
      label: The question
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you actually trying to do? What did you already check or try?

  - type: checkboxes
    id: confirm
    attributes:
      label: Before you submit
      options:
        - label: I checked the README, oragent.org, and existing issues.
          required: true
